<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B2C"/>
      <stop offset="100%" stop-color="#FF8F40"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square -->
  <rect x="20" y="20" width="216" height="216" rx="48" fill="url(#bg)"/>
  <rect x="20" y="20" width="216" height="216" rx="48" fill="url(#shine)"/>
  <!-- C letter -->
  <path d="M 96 88 A 42 42 0 1 0 96 168" fill="none" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- P letter -->
  <line x1="148" y1="80" x2="148" y2="176" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <path d="M 148 80 L 170 80 A 24 24 0 0 1 170 128 L 148 128" fill="none" stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Context dots (top) -->
  <circle cx="88" cy="52" r="5" fill="white" opacity="0.7"/>
  <circle cx="128" cy="46" r="5" fill="white" opacity="0.7"/>
  <circle cx="168" cy="52" r="5" fill="white" opacity="0.7"/>
  <!-- Connection lines from dots -->
  <line x1="88" y1="57" x2="96" y2="80" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="128" y1="51" x2="128" y2="80" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <line x1="168" y1="57" x2="160" y2="80" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <!-- Pilot compass dot -->
  <circle cx="128" cy="200" r="8" fill="white" opacity="0.6"/>
  <circle cx="128" cy="200" r="4" fill="white" opacity="0.9"/>
</svg>
